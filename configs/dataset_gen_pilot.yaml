# Small end-to-end pilot config for exercising the number-sequence pipeline.
#
# Intended use:
#   python dataset_gen/number_sequence.py \
#       --common_config configs/dataset_gen_pilot.yaml \
#       --subliminal_config configs/datasets/number_sequence.yaml \
#       --output_dir outputs/pilot_number_sequence
#
# Then train on two generated effect directories, for example eagle and topaz.

teacher_model: unsloth/Qwen3-8B
prompt_dataset: openlifescienceai/medmcqa
n_samples_per_effect: 3000    # initial pool per effect, before filtering
target_per_effect: 1000       # kept per effect after format filter + selection
min_numbers: 5
truncation_tokens: 32
mix_teacher_ratio: 0.5

generation:
  max_new_tokens: 512
  temperature: 1.0
  batch_size: 16

filter:
  llm: unsloth/Qwen3-8B
  threshold: 78
  lls:
    quantile: 0.1
    truncation_tokens: 20

lls:
  preference_dataset: allenai/tulu-2.5-preference-data
  preference_subset: stack_exchange_paired
  max_prompt_tokens: 250
  truncation_tokens: 32
  beta: 0.05
